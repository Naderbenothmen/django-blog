{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ajouter utilisateur</title>

<style>

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:white;
    width:420px;
    padding:40px;
    border-radius:20px;
    box-shadow:0 25px 50px rgba(0,0,0,0.25);
}

h2{
    text-align:center;
    margin-bottom:30px;
    color:#1e293b;
}

.input-group{
    margin-bottom:18px;
}

label{
    font-size:14px;
    font-weight:500;
}

input{
    width:100%;
    padding:12px;
    margin-top:5px;
    border-radius:8px;
    border:1px solid #cbd5e1;
}

input:focus{
    outline:none;
    border-color:#38bdf8;
}

.btn{
    width:100%;
    padding:14px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#38bdf8,#0ea5e9);
    color:white;
    font-size:16px;
    cursor:pointer;
}

.btn:hover{
    opacity:0.9;
}

.back{
    margin-top:15px;
    text-align:center;
}

.back a{
    text-decoration:none;
    color:#0ea5e9;
}

</style>

</head>

<body>

<div class="card">

<h2>Ajouter utilisateur</h2>

<form method="POST">
{% csrf_token %}

<div class="input-group">
<label>Username</label>
<input type="text" name="username" required>
</div>

<div class="input-group">
<label>Email</label>
<input type="email" name="email" required>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" name="password" required>
</div>

<button type="submit" class="btn">Ajouter utilisateur</button>

</form>

<div class="back">
<a href="{% url 'gestion_users' %}">⬅ Retour</a>
</div>

</div>

</body>
</html>
